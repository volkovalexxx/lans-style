server {
    listen 80;
    server_name lans-style.by www.lans-style.by;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name lans-style.by www.lans-style.by;
    ssl_certificate /etc/letsencrypt/live/lans-style.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lans-style.by/privkey.pem;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;
    location /api/ { proxy_pass http://server:5000/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /uploads/ { proxy_pass http://server:5000/uploads/; expires 30d; }
    location / { try_files $uri $uri/ /index.html; }
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
