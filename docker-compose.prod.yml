services:
  postgres:
    image: postgres:16-alpine
    container_name: lans_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lans_style}
      POSTGRES_USER: ${POSTGRES_USER:-lans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lans_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: lans_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lans}:${POSTGRES_PASSWORD:-lans_secret}@postgres:5432/${POSTGRES_DB:-lans_style}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      NODE_ENV: production
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: lans_client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  pgdata:
