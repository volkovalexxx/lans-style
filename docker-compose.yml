version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lans_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lans_style}
      POSTGRES_USER: ${POSTGRES_USER:-lans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lans_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lans_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lans.by}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - postgres

volumes:
  pgdata:
